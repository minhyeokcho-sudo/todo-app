<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할 일 목록</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --border: #e5e5ea;
    --hover: #f5f5f7;
    --primary: #0071e3;
    --primary-hover: #0077ed;
    --danger: #ff3b30;
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  [data-theme="dark"] {
    --bg: #1c1c1e;
    --card: #2c2c2e;
    --text: #f5f5f7;
    --text-secondary: #98989d;
    --border: #38383a;
    --hover: #3a3a3c;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: background 0.3s;
  }

  .main-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    align-items: stretch;
  }

  .active-section {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .completed-section {
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--bg);
  }

  [data-theme="dark"] .completed-section { background: rgba(255,255,255,0.02); }

  .completed-header {
    padding: 18px 22px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .completed-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .done-count {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--border);
    color: var(--text-secondary);
    font-weight: 600;
    min-width: 18px;
    text-align: center;
  }

  .completed-header #clearCompleted {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: inherit;
    transition: color 0.2s, background 0.2s;
  }

  .completed-header #clearCompleted:hover { color: var(--danger); background: var(--card); }

  #completedList {
    list-style: none;
    flex: 1;
    overflow-y: auto;
    min-height: 200px;
    max-height: 60vh;
  }

  #completedList .todo-item {
    padding: 10px 22px;
    gap: 8px;
    font-size: 13px;
  }
  #completedList .todo-item .text { font-size: 13px; }
  #completedList .todo-item .date { display: none; }
  #completedList .todo-item .drag-handle { display: none; }
  #completedList .todo-item button { font-size: 11px; padding: 4px 8px; }
  #completedList .empty-state { padding: 40px 16px; font-size: 13px; }
  #completedList .empty-state .emoji { font-size: 26px; margin-bottom: 8px; }

  .memo.has-content {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .memo.has-content:hover { background: var(--primary-hover); color: white; }

  .todo-item .memo-area {
    flex-basis: 100%;
    margin-top: 6px;
  }

  .todo-item .memo-area textarea {
    width: 100%;
    min-height: 70px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .todo-item .memo-area textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
  }

  header {
    padding: 24px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  #themeToggle {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  #themeToggle:hover { background: var(--hover); }

  .input-area {
    padding: 20px 28px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  #todoInput {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }

  #todoInput:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
  }

  #priority {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    outline: none;
  }

  #categoryInput {
    width: 110px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }

  #categoryInput:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
  }

  #categoryFilter {
    margin-left: auto;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    outline: none;
    max-width: 160px;
  }

  #categoryFilter:hover { color: var(--text); border-color: var(--text-secondary); }

  .todo-item .category {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .todo-item.done .category { opacity: 0.5; }

  #addBtn {
    padding: 12px 22px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.05s;
    font-family: inherit;
  }

  #addBtn:hover { background: var(--primary-hover); }
  #addBtn:active { transform: scale(0.97); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .filter {
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter:hover { color: var(--text); border-color: var(--text-secondary); }

  .filter.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .filter .count {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 10px;
    background: rgba(0,0,0,0.08);
  }

  .filter.active .count {
    background: rgba(255,255,255,0.25);
  }

  #todoList {
    list-style: none;
    min-height: 120px;
    max-height: 60vh;
    overflow-y: auto;
  }

  .todo-item {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    position: relative;
  }

  .todo-item:last-child { border-bottom: none; }
  .todo-item:hover { background: var(--hover); }

  .todo-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .todo-item.priority-high::before { background: var(--danger); }
  .todo-item.priority-low::before { background: var(--text-secondary); opacity: 0.4; }

  .todo-item input[type=checkbox] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  .todo-item .text {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
    line-height: 1.4;
    cursor: pointer;
  }

  .todo-item.done .text {
    text-decoration: line-through;
    color: var(--text-secondary);
  }

  .todo-item .text-edit {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid var(--primary);
    border-radius: 6px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }

  .todo-item .category-edit {
    width: 110px;
    padding: 6px 10px;
    border: 1px solid var(--primary);
    border-radius: 6px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
    flex-shrink: 0;
  }

  .todo-item .drag-handle {
    color: var(--text-secondary);
    opacity: 0.35;
    cursor: grab;
    font-size: 16px;
    line-height: 1;
    user-select: none;
    flex-shrink: 0;
    padding: 0 2px;
    transition: opacity 0.15s;
  }

  .todo-item:hover .drag-handle { opacity: 0.75; }
  .todo-item.dragging { opacity: 0.4; }
  .todo-item.dragging .drag-handle { cursor: grabbing; }
  .todo-item.drag-over-top { box-shadow: inset 0 2px 0 var(--primary); }
  .todo-item.drag-over-bottom { box-shadow: inset 0 -2px 0 var(--primary); }

  .todo-item .date {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .todo-item .actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .todo-item:hover .actions { opacity: 1; }

  .todo-item button {
    padding: 6px 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .todo-item button:hover {
    color: var(--text);
    background: var(--card);
  }

  .todo-item .delete:hover {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
  }

  footer {
    padding: 16px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-secondary);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }

  #clearCompleted {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: inherit;
    padding: 4px 8px;
    border-radius: 6px;
  }

  #clearCompleted:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .empty-state .emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
    .completed-section { border-left: none; border-top: 1px solid var(--border); }
    #completedList { max-height: none; }
  }

  @media (max-width: 600px) {
    body { padding: 16px 8px; }
    .container { border-radius: 12px; }
    header { padding: 18px 18px; }
    .input-area { padding: 14px 18px; flex-direction: column; }
    .input-area > * { width: 100%; }
    .filters { padding: 12px 18px; }
    .todo-item { padding: 12px 18px; }
    .todo-item .actions { opacity: 1; }
    footer { padding: 14px 18px; }
    .todo-item .date { display: none; }
    .completed-header { padding: 14px 18px 10px; }
    #completedList .todo-item { padding: 10px 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📝 할 일 목록</h1>
    <button id="themeToggle" title="테마 변경">🌙</button>
  </header>

  <div class="main-grid">
    <section class="active-section">
      <div class="input-area">
        <input type="text" id="categoryInput" list="categoryList" placeholder="대분류" maxlength="30" title="대분류 (선택)">
        <datalist id="categoryList"></datalist>
        <select id="priority" title="중요도">
          <option value="normal">보통</option>
          <option value="high">높음</option>
          <option value="low">낮음</option>
        </select>
        <input type="text" id="todoInput" placeholder="할 일을 입력하고 Enter 키를 누르세요" maxlength="200" autofocus>
        <button id="addBtn">추가</button>
      </div>

      <div class="filters">
        <select id="categoryFilter" title="분류로 필터"><option value="">분류: 전체</option></select>
      </div>

      <ul id="todoList"></ul>

      <footer>
        <span id="counter">0개 남음</span>
      </footer>
    </section>

    <aside class="completed-section">
      <div class="completed-header">
        <h2>✅ 완료 <span id="doneCount" class="done-count">0</span></h2>
        <button id="clearCompleted" title="완료된 항목 모두 삭제">전체 삭제</button>
      </div>
      <ul id="completedList"></ul>
    </aside>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'todos-v1';
  const THEME_KEY = 'todos-theme';

  const $input = document.getElementById('todoInput');
  const $categoryInput = document.getElementById('categoryInput');
  const $categoryList = document.getElementById('categoryList');
  const $categoryFilter = document.getElementById('categoryFilter');
  const $priority = document.getElementById('priority');
  const $addBtn = document.getElementById('addBtn');
  const $list = document.getElementById('todoList');
  const $completedList = document.getElementById('completedList');
  const $doneCount = document.getElementById('doneCount');
  const $counter = document.getElementById('counter');
  const $clear = document.getElementById('clearCompleted');
  const $themeToggle = document.getElementById('themeToggle');
  const $grid = document.querySelector('.main-grid');

  let todos = [];
  let categoryFilter = '';
  const expandedMemos = new Set();

  try {
    todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    todos = [];
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {
      console.warn('저장 실패:', e);
    }
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }
    return (d.getMonth()+1) + '/' + d.getDate();
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function categoryStyle(name, isDark) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = (name.charCodeAt(i) + ((hash << 5) - hash)) | 0;
    const h = Math.abs(hash) % 360;
    return isDark
      ? 'background:hsl(' + h + ',40%,28%);color:hsl(' + h + ',70%,85%);'
      : 'background:hsl(' + h + ',70%,92%);color:hsl(' + h + ',45%,30%);';
  }

  function renderItem(t, isDark) {
    const cat = (t.category || '').trim();
    const chip = cat ? '<span class="category" style="' + categoryStyle(cat, isDark) + '">' + escapeHtml(cat) + '</span>' : '';
    const hasMemo = (t.memo || '').trim().length > 0;
    const memoOpen = expandedMemos.has(t.id);
    const memoArea = memoOpen
      ? '<div class="memo-area"><textarea class="memo-textarea" placeholder="세부 메모 (입력 시 자동 저장)" maxlength="2000">' + escapeHtml(t.memo || '') + '</textarea></div>'
      : '';
    return '<li class="todo-item ' + (t.done ? 'done ' : '') + 'priority-' + t.priority + '" data-id="' + t.id + '" draggable="true">' +
        '<span class="drag-handle" title="드래그하여 순서 변경" aria-hidden="true">⠿</span>' +
        '<input type="checkbox"' + (t.done ? ' checked' : '') + '>' +
        chip +
        '<span class="text">' + escapeHtml(t.text) + '</span>' +
        '<span class="date">' + formatDate(t.createdAt) + '</span>' +
        '<div class="actions">' +
          '<button class="memo' + (hasMemo ? ' has-content' : '') + '" title="메모">메모</button>' +
          '<button class="edit" title="수정">수정</button>' +
          '<button class="delete" title="삭제">삭제</button>' +
        '</div>' +
        memoArea +
      '</li>';
  }

  function render() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    const categories = [...new Set(todos.map(t => (t.category || '').trim()).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'ko'));
    $categoryList.innerHTML = categories.map(c => '<option value="' + escapeHtml(c) + '">').join('');
    if (categoryFilter && !categories.includes(categoryFilter)) categoryFilter = '';
    $categoryFilter.innerHTML = '<option value="">분류: 전체</option>' +
      categories.map(c => '<option value="' + escapeHtml(c) + '"' + (c === categoryFilter ? ' selected' : '') + '>' + escapeHtml(c) + '</option>').join('');

    const matchesCategory = t => !categoryFilter || (t.category || '') === categoryFilter;
    const activeTodos = todos.filter(t => !t.done && matchesCategory(t));
    const completedTodos = todos.filter(t => t.done && matchesCategory(t));

    if (activeTodos.length === 0) {
      const m = categoryFilter
        ? { emoji: '🔍', text: '"' + categoryFilter + '" 분류에 진행 중인 할 일이 없어요.' }
        : { emoji: '✨', text: '진행 중인 할 일이 없어요. 위에서 추가해 보세요!' };
      $list.innerHTML = '<li class="empty-state"><span class="emoji">' + m.emoji + '</span>' + escapeHtml(m.text) + '</li>';
    } else {
      $list.innerHTML = activeTodos.map(t => renderItem(t, isDark)).join('');
    }

    if (completedTodos.length === 0) {
      const m = categoryFilter
        ? { emoji: '📭', text: '이 분류에 완료된 항목이 없어요.' }
        : { emoji: '📭', text: '완료한 항목이 없어요.' };
      $completedList.innerHTML = '<li class="empty-state"><span class="emoji">' + m.emoji + '</span>' + escapeHtml(m.text) + '</li>';
    } else {
      $completedList.innerHTML = completedTodos.map(t => renderItem(t, isDark)).join('');
    }

    const totalActive = todos.filter(t => !t.done).length;
    const totalDone = todos.length - totalActive;
    $counter.textContent = totalActive + '개 남음';
    $doneCount.textContent = totalDone;
  }

  function addTodo() {
    const text = $input.value.trim();
    if (!text) return;
    todos.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2,6),
      text: text,
      category: $categoryInput.value.trim(),
      done: false,
      priority: $priority.value,
      createdAt: Date.now()
    });
    $input.value = '';
    $priority.value = 'normal';
    // 대분류는 같은 분류로 연달아 추가하는 경우가 많아 유지
    save();
    render();
    $input.focus();
  }

  $categoryFilter.addEventListener('change', () => {
    categoryFilter = $categoryFilter.value;
    render();
  });

  let draggedId = null;
  let draggedFromList = null; // 'active' | 'completed'

  function listOf(li) {
    return li.closest('ul')?.id === 'completedList' ? 'completed' : 'active';
  }

  function clearDragIndicators() {
    $grid.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
      el.classList.remove('drag-over-top', 'drag-over-bottom');
    });
  }

  $grid.addEventListener('dragstart', e => {
    const li = e.target.closest('.todo-item');
    if (!li) return;
    draggedId = li.dataset.id;
    draggedFromList = listOf(li);
    li.classList.add('dragging');
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', draggedId); } catch (_) {}
    }
  });

  $grid.addEventListener('dragend', () => {
    $grid.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    clearDragIndicators();
    draggedId = null;
    draggedFromList = null;
  });

  $grid.addEventListener('dragover', e => {
    if (!draggedId) return;
    const li = e.target.closest('.todo-item');
    if (!li || li.dataset.id === draggedId) return;
    if (listOf(li) !== draggedFromList) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
    const rect = li.getBoundingClientRect();
    const above = (e.clientY - rect.top) < rect.height / 2;
    clearDragIndicators();
    li.classList.add(above ? 'drag-over-top' : 'drag-over-bottom');
  });

  $grid.addEventListener('dragleave', e => {
    if (!e.relatedTarget || !$grid.contains(e.relatedTarget)) clearDragIndicators();
  });

  $grid.addEventListener('drop', e => {
    e.preventDefault();
    const targetLi = e.target.closest('.todo-item');
    if (!targetLi || !draggedId || targetLi.dataset.id === draggedId) {
      clearDragIndicators();
      return;
    }
    if (listOf(targetLi) !== draggedFromList) {
      clearDragIndicators();
      return;
    }
    const targetId = targetLi.dataset.id;
    const rect = targetLi.getBoundingClientRect();
    const dropAbove = (e.clientY - rect.top) < rect.height / 2;

    const fromIdx = todos.findIndex(t => t.id === draggedId);
    if (fromIdx === -1) return;
    const [moved] = todos.splice(fromIdx, 1);
    const newToIdx = todos.findIndex(t => t.id === targetId);
    if (newToIdx === -1) {
      todos.splice(fromIdx, 0, moved);
      return;
    }
    todos.splice(dropAbove ? newToIdx : newToIdx + 1, 0, moved);
    save();
    render();
  });

  $addBtn.addEventListener('click', addTodo);

  $input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTodo();
    }
  });

  $grid.addEventListener('click', e => {
    const li = e.target.closest('.todo-item');
    if (!li) return;
    const id = li.dataset.id;
    const todo = todos.find(t => t.id === id);
    if (!todo) return;

    if (e.target.matches('input[type=checkbox]')) {
      todo.done = e.target.checked;
      save();
      render();
    } else if (e.target.matches('.memo')) {
      if (expandedMemos.has(id)) expandedMemos.delete(id);
      else expandedMemos.add(id);
      render();
      // 메모 열었으면 textarea로 포커스 이동
      if (expandedMemos.has(id)) {
        const ta = document.querySelector('.todo-item[data-id="' + CSS.escape(id) + '"] .memo-textarea');
        if (ta) { ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; }
      }
    } else if (e.target.matches('.delete')) {
      if (confirm('이 할 일을 삭제하시겠습니까?\n\n' + todo.text)) {
        todos = todos.filter(t => t.id !== id);
        expandedMemos.delete(id);
        save();
        render();
      }
    } else if (e.target.matches('.edit') || e.target.matches('.text') || e.target.matches('.category')) {
      startEdit(li, todo);
    }
  });

  $grid.addEventListener('input', e => {
    if (!e.target.matches('.memo-textarea')) return;
    const li = e.target.closest('.todo-item');
    if (!li) return;
    const id = li.dataset.id;
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.memo = e.target.value;
    save();
    const memoBtn = li.querySelector('.memo');
    if (memoBtn) {
      if (todo.memo.trim()) memoBtn.classList.add('has-content');
      else memoBtn.classList.remove('has-content');
    }
  });

  function startEdit(li, todo) {
    li.draggable = false;

    const textSpan = li.querySelector('.text');
    const catSpan = li.querySelector('.category');

    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.className = 'text-edit';
    textInput.value = todo.text;
    textInput.maxLength = 200;

    const catInput = document.createElement('input');
    catInput.type = 'text';
    catInput.className = 'category-edit';
    catInput.value = todo.category || '';
    catInput.maxLength = 30;
    catInput.placeholder = '대분류';
    catInput.setAttribute('list', 'categoryList');

    textSpan.replaceWith(textInput);
    if (catSpan) {
      catSpan.replaceWith(catInput);
    } else {
      textInput.after(catInput);
    }

    textInput.focus();
    textInput.select();

    let done = false;

    function commit() {
      if (done) return;
      const newText = textInput.value.trim();
      if (!newText) { render(); done = true; return; }
      done = true;
      todo.text = newText;
      todo.category = catInput.value.trim();
      save();
      render();
    }
    function cancel() {
      if (done) return;
      done = true;
      render();
    }
    function maybeCommit() {
      setTimeout(() => {
        const a = document.activeElement;
        if (a !== textInput && a !== catInput) commit();
      }, 0);
    }

    [textInput, catInput].forEach(inp => {
      inp.addEventListener('blur', maybeCommit);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
      });
    });
  }

  $clear.addEventListener('click', () => {
    const doneCount = todos.filter(t => t.done).length;
    if (doneCount === 0) {
      alert('완료된 항목이 없습니다.');
      return;
    }
    if (confirm('완료된 ' + doneCount + '개 항목을 모두 삭제하시겠습니까?')) {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }
  });

  // Theme
  const savedTheme = localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);

  $themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
    render();
  });

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    $themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    $themeToggle.title = theme === 'dark' ? '라이트 모드' : '다크 모드';
  }

  render();
})();
</script>
</body>
</html>
